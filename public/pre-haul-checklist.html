<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haul Ready — Camper Checklist</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #1a1c18;
        --surface: #22251e;
        --surface2: #2c3026;
        --border: #3a4032;
        --accent: #c8a84b;
        --accent2: #8db87a;
        --danger: #c0533a;
        --text: #e8e4d8;
        --muted: #8a8c80;
        --checked-bg: #1e2419;
        --checked-tx: #5a6a52;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Barlow', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image: radial-gradient(
            ellipse 80% 40% at 50% -10%,
            rgba(200, 168, 75, 0.12) 0%,
            transparent 60%
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 39px,
            rgba(255, 255, 255, 0.02) 40px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 39px,
            rgba(255, 255, 255, 0.02) 40px
          );
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.4rem 2rem 1.2rem;
        border-bottom: 1px solid var(--border);
        background: rgba(26, 28, 24, 0.85);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
      }
      .brand-icon {
        font-size: 1.5rem;
      }
      .brand-title {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.55rem;
        letter-spacing: 0.06em;
        color: var(--accent);
        line-height: 1;
      }
      .brand-sub {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        margin-left: 0.2rem;
      }

      /* ── Auth ── */
      #auth-area {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .btn {
        font-family: 'Barlow', sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.45rem 1rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-gold {
        background: var(--accent);
        color: #1a1c18;
      }
      .btn-gold:hover {
        background: #d9bb60;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--muted);
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
      }
      .btn-danger:hover {
        background: #d4644a;
      }
      .btn-green {
        background: var(--accent2);
        color: #1a1c18;
      }
      .btn-green:hover {
        background: #9dcc8a;
      }

      #user-info {
        font-size: 0.8rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      #user-info span {
        color: var(--accent2);
        font-weight: 600;
      }

      /* ── Main ── */
      main {
        max-width: 680px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      /* ── Progress ── */
      .progress-wrap {
        margin-bottom: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #progress-count {
        color: var(--accent);
      }
      .progress-bar {
        height: 5px;
        background: var(--surface2);
        border-radius: 99px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border-radius: 99px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
      }

      /* ── Reset bar ── */
      .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1rem;
        gap: 0.5rem;
      }
      .btn-sm {
        font-size: 0.75rem;
        padding: 0.35rem 0.8rem;
      }

      /* ── Checklist ── */
      #checklist {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .item {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.85rem 1rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s;
        user-select: none;
        animation: slideIn 0.25s ease both;
      }
      .item:hover {
        border-color: var(--accent);
      }
      .item.checked {
        background: var(--checked-bg);
        border-color: transparent;
      }
      .item.checked .item-text {
        color: var(--checked-tx);
        text-decoration: line-through;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .item-num {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--muted);
        min-width: 1.6rem;
        text-align: right;
      }
      .item.checked .item-num {
        color: var(--checked-tx);
      }

      /* custom checkbox */
      .check-box {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 2px solid var(--border);
        flex-shrink: 0;
        display: grid;
        place-items: center;
        transition: all 0.15s;
        background: var(--surface2);
      }
      .item:hover .check-box {
        border-color: var(--accent);
      }
      .item.checked .check-box {
        background: var(--accent2);
        border-color: var(--accent2);
      }
      .check-box svg {
        display: none;
      }
      .item.checked .check-box svg {
        display: block;
      }

      .item-text {
        flex: 1;
        font-size: 0.97rem;
        font-weight: 400;
        color: var(--text);
        transition: color 0.15s;
        line-height: 1.3;
      }

      /* ── Edit mode controls ── */
      .item-actions {
        display: none;
        gap: 0.4rem;
      }
      body.edit-mode .item-actions {
        display: flex;
      }
      body.edit-mode .item {
        cursor: default;
      }
      body.edit-mode .item:hover {
        border-color: var(--border);
      }

      .action-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 4px;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.15s;
        font-family: 'Barlow', sans-serif;
      }
      .action-btn:hover {
        color: var(--text);
        border-color: var(--muted);
      }
      .action-btn.del:hover {
        color: var(--danger);
        border-color: var(--danger);
      }
      .drag-handle {
        cursor: grab;
        color: var(--muted);
        font-size: 1.1rem;
        padding: 0 0.2rem;
        display: none;
        touch-action: none;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      body.edit-mode .drag-handle {
        display: block;
      }

      /* ── Drag and drop states ── */
      .item.dragging {
        opacity: 0.35;
        border-style: dashed;
      }
      .item.drag-over {
        border-color: var(--accent) !important;
        background: rgba(200, 168, 75, 0.08) !important;
      }

      /* ── Inline edit ── */
      .item-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--accent);
        color: var(--text);
        font-family: 'Barlow', sans-serif;
        font-size: 0.97rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        outline: none;
      }

      /* ── Add item ── */
      #add-area {
        display: none;
        margin-top: 1.2rem;
        gap: 0.5rem;
        align-items: center;
      }
      body.edit-mode #add-area {
        display: flex;
      }
      #new-item-input {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'Barlow', sans-serif;
        font-size: 0.95rem;
        padding: 0.6rem 0.9rem;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.15s;
      }
      #new-item-input:focus {
        border-color: var(--accent);
      }
      #new-item-input::placeholder {
        color: var(--muted);
      }

      /* ── Edit mode toggle ── */
      #edit-toggle-area {
        margin-top: 1.8rem;
        text-align: center;
      }

      /* ── Auth modal ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 100;
        place-items: center;
      }
      .modal-overlay.open {
        display: grid;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 2rem;
        width: 360px;
        max-width: 95vw;
        animation: popIn 0.2s ease;
      }
      @keyframes popIn {
        from {
          transform: scale(0.92);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal h2 {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.2rem;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 1.2rem;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }
      .field label {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .field input {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'Barlow', sans-serif;
        font-size: 0.95rem;
        padding: 0.6rem 0.8rem;
        border-radius: 5px;
        outline: none;
        transition: border-color 0.15s;
      }
      .field input:focus {
        border-color: var(--accent);
      }
      .modal-actions {
        display: flex;
        gap: 0.6rem;
        margin-top: 1.2rem;
      }
      #auth-error {
        font-size: 0.82rem;
        color: var(--danger);
        min-height: 1.1em;
      }

      /* ── Complete banner ── */
      #complete-banner {
        display: none;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: #1a1c18;
        text-align: center;
        padding: 0.9rem;
        font-family: 'Black Han Sans', sans-serif;
        letter-spacing: 0.12em;
        font-size: 1rem;
        margin-bottom: 1.5rem;
        border-radius: 6px;
        animation: popIn 0.3s ease;
      }

      /* ── Loading ── */
      #loading {
        text-align: center;
        padding: 3rem;
        color: var(--muted);
        font-size: 0.9rem;
        letter-spacing: 0.1em;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-icon">🚐</span>
        <div>
          <div class="brand-title">HAUL READY</div>
          <div class="brand-sub">Camper Pre-Haul Checklist</div>
        </div>
      </div>
      <div id="auth-area">
        <div id="user-info" style="display: none">
          Signed in as <span id="user-email"></span>
          <button class="btn btn-ghost btn-sm" id="sign-out-btn">
            Sign Out
          </button>
        </div>
        <button class="btn btn-gold" id="sign-in-btn">Sign In</button>
      </div>
    </header>

    <main>
      <div id="complete-banner">🎉 ALL SYSTEMS GO — SAFE TRAVELS! 🎉</div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Pre-Trip Progress</span>
          <span id="progress-count">0 / 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>

      <div class="top-bar">
        <button class="btn btn-ghost btn-sm" id="reset-btn">↺ Reset</button>
      </div>

      <div id="loading"><span class="spinner"></span>Loading checklist…</div>
      <div id="checklist"></div>

      <div id="add-area">
        <input
          type="text"
          id="new-item-input"
          placeholder="Add new item…"
          maxlength="120"
        />
        <button class="btn btn-green btn-sm" id="add-btn">+ Add</button>
      </div>

      <div id="edit-toggle-area" style="display: none">
        <button class="btn btn-ghost" id="edit-toggle-btn">✏️ Edit List</button>
      </div>
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
      <div class="modal">
        <h2>SIGN IN</h2>
        <div class="field">
          <label>Email</label>
          <input
            type="email"
            id="auth-email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <div class="field">
          <label>Password</label>
          <input
            type="password"
            id="auth-password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <div id="auth-error"></div>
        <div class="modal-actions">
          <button class="btn btn-gold" id="do-sign-in">Sign In</button>
          <button class="btn btn-ghost" id="close-modal">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Firebase -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
      import {
        getAuth,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
      import {
        getDatabase,
        ref,
        set,
        get,
        push,
        remove,
        update,
        onValue,
      } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

      // ── Firebase config ──
      const firebaseConfig = {
        apiKey: 'AIzaSyDO_RXTRJx_PYGERVMcBJTL2aoAgpTXQeE',
        authDomain: 'cmk63project.firebaseapp.com',
        databaseURL: 'https://cmk63project-default-rtdb.firebaseio.com',
        projectId: 'cmk63project',
        storageBucket: 'cmk63project.appspot.com',
        messagingSenderId: '520150418866',
        appId: '1:520150418866:web:5bd7d2aa561b987b1b90ab',
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      // ── State ──
      let currentUser = null;
      let items = []; // [{id, text, order}]
      let checked = {}; // {id: bool}  — session only (not persisted)
      let editMode = false;
      let unsubscribe = null;
      let dragSrcId = null;

      // ── DOM refs ──
      const checklistEl = document.getElementById('checklist');
      const loadingEl = document.getElementById('loading');
      const progressFill = document.getElementById('progress-fill');
      const progressCount = document.getElementById('progress-count');
      const completeBanner = document.getElementById('complete-banner');
      const editToggleArea = document.getElementById('edit-toggle-area');
      const editToggleBtn = document.getElementById('edit-toggle-btn');
      const addArea = document.getElementById('add-area');
      const newItemInput = document.getElementById('new-item-input');
      const addBtn = document.getElementById('add-btn');
      const resetBtn = document.getElementById('reset-btn');
      const signInBtn = document.getElementById('sign-in-btn');
      const signOutBtn = document.getElementById('sign-out-btn');
      const userInfo = document.getElementById('user-info');
      const userEmail = document.getElementById('user-email');
      const authModal = document.getElementById('auth-modal');
      const authEmailEl = document.getElementById('auth-email');
      const authPassEl = document.getElementById('auth-password');
      const authError = document.getElementById('auth-error');
      const doSignIn = document.getElementById('do-sign-in');
      const closeModal = document.getElementById('close-modal');

      // ── Paths ──
      const itemsPath = `pre_haul_checklist/items`;

      // ── Auth state ──
      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          signInBtn.style.display = 'none';
          userInfo.style.display = 'flex';
          userEmail.textContent = user.email;
          editToggleArea.style.display = 'block';
        } else {
          signInBtn.style.display = '';
          userInfo.style.display = 'none';
          editToggleArea.style.display = 'none';
          if (editMode) toggleEditMode(false);
          if (unsubscribe) {
            unsubscribe();
            unsubscribe = null;
          }
        }
        loadItemsFromFirebase();
      });

      function loadItemsFromFirebase() {
        if (unsubscribe) unsubscribe();
        const r = ref(db, itemsPath);
        // Check if items exist; seed defaults if first time
        get(r).then((snap) => {
          // if (!snap.exists()) {
          //   // Seed default items
          //   const batch = {};
          //   DEFAULT_ITEMS.forEach((text, i) => {
          //     const key = 'item_' + Date.now() + '_' + i;
          //     batch[key] = { text, order: i };
          //   });
          //   set(r, batch);
          // }
        });
        // Live listener
        unsubscribe = onValue(r, (snap) => {
          loadingEl.style.display = 'none';
          if (snap.exists()) {
            const raw = snap.val();
            items = Object.entries(raw)
              .map(([id, v]) => ({ id, text: v.text, order: v.order ?? 0 }))
              .sort((a, b) => a.order - b.order);
          } else {
            items = [];
          }
          if (!dragSrcId) render(); // don't re-render while dragging
        });
      }

      // ── Render ──
      function render() {
        checklistEl.innerHTML = '';
        const total = items.length;
        const done = items.filter((i) => checked[i.id]).length;

        progressCount.textContent = `${done} / ${total}`;
        const pct = total ? (done / total) * 100 : 0;
        progressFill.style.width = pct + '%';
        completeBanner.style.display =
          total > 0 && done === total ? 'block' : 'none';

        items.forEach((item, idx) => {
          const isChecked = !!checked[item.id];
          const div = document.createElement('div');
          div.className = 'item' + (isChecked ? ' checked' : '');
          div.dataset.id = item.id;
          div.dataset.idx = idx;

          div.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="item-num">${String(idx + 1).padStart(2, '0')}</span>
      <div class="check-box">
        <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
          <polyline points="1,5 5,9 12,1" stroke="#1a1c18" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="item-text">${escHtml(item.text)}</span>
      <div class="item-actions">
        <button class="action-btn edit-btn" data-id="${item.id}">Edit</button>
        <button class="action-btn del" data-id="${item.id}">✕</button>
      </div>
    `;

          // Toggle check (only when not in edit mode)
          div.addEventListener('click', (e) => {
            if (editMode) return;
            if (e.target.closest('.item-actions')) return;
            checked[item.id] = !checked[item.id];
            render();
          });

          checklistEl.appendChild(div);
        });

        // Edit / delete buttons
        document.querySelectorAll('.edit-btn').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            startInlineEdit(btn.dataset.id);
          });
        });
        document.querySelectorAll('.action-btn.del').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteItem(btn.dataset.id);
          });
        });

        // ── Drag and drop (edit mode only) ──

        document.querySelectorAll('.item').forEach((row) => {
          const handle = row.querySelector('.drag-handle');

          // Make the whole row draggable but only initiate via handle
          handle.addEventListener('mousedown', () => {
            row.draggable = true;
          });
          handle.addEventListener(
            'touchstart',
            () => {
              row.draggable = true;
            },
            { passive: true }
          );
          row.addEventListener('dragend', () => {
            row.draggable = false;
          });

          row.addEventListener('dragstart', (e) => {
            if (!editMode) {
              e.preventDefault();
              return;
            }
            dragSrcId = row.dataset.id;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => row.classList.add('dragging'), 0);
          });

          row.addEventListener('dragend', () => {
            row.classList.remove('dragging');
            document
              .querySelectorAll('.item')
              .forEach((r) => r.classList.remove('drag-over'));
            dragSrcId = null;
          });

          row.addEventListener('dragover', (e) => {
            if (!editMode || !dragSrcId) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            document
              .querySelectorAll('.item')
              .forEach((r) => r.classList.remove('drag-over'));
            if (row.dataset.id !== dragSrcId) row.classList.add('drag-over');
          });

          row.addEventListener('dragleave', () => {
            row.classList.remove('drag-over');
          });

          row.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!editMode || !dragSrcId || row.dataset.id === dragSrcId) return;
            row.classList.remove('drag-over');

            // Reorder items array
            const fromIdx = items.findIndex((i) => i.id === dragSrcId);
            const toIdx = items.findIndex((i) => i.id === row.dataset.id);
            if (fromIdx === -1 || toIdx === -1) return;

            const moved = items.splice(fromIdx, 1)[0];
            items.splice(toIdx, 0, moved);

            // Reassign order values and persist
            items.forEach((item, idx) => {
              item.order = idx;
            });
            saveOrder();
            render();
          });
        });
      }

      // ── Inline edit ──
      function startInlineEdit(id) {
        const item = items.find((i) => i.id === id);
        if (!item) return;
        const div = checklistEl.querySelector(`[data-id="${id}"]`);
        const textSpan = div.querySelector('.item-text');
        const input = document.createElement('input');
        input.className = 'item-input';
        input.value = item.text;
        textSpan.replaceWith(input);
        input.focus();

        const save = () => {
          const val = input.value.trim();
          if (val && val !== item.text) saveItemText(id, val, item.order);
          else render();
        };
        input.addEventListener('blur', save);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            input.blur();
          }
          if (e.key === 'Escape') {
            render();
          }
        });
      }

      // ── Firebase CRUD ──
      function saveItemText(id, text, order) {
        if (!currentUser) return;
        update(ref(db, `${itemsPath}/${id}`), { text, order });
      }

      function deleteItem(id) {
        if (!currentUser) return;
        if (!confirm('Remove this item?')) return;
        remove(ref(db, `${itemsPath}/${id}`));
        delete checked[id];
      }

      function saveOrder() {
        if (!currentUser) return;
        const updates = {};
        items.forEach((item) => {
          updates[`${itemsPath}/${item.id}/order`] = item.order;
        });
        update(ref(db), updates);
      }

      function addItem(text) {
        if (!currentUser) return;
        const maxOrder = items.length
          ? Math.max(...items.map((i) => i.order)) + 1
          : 0;
        const r = ref(db, itemsPath);
        push(r, { text, order: maxOrder });
      }

      // ── Add item UI ──
      addBtn.addEventListener('click', () => {
        const val = newItemInput.value.trim();
        if (!val) return;
        addItem(val);
        newItemInput.value = '';
        newItemInput.focus();
      });
      newItemInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addBtn.click();
      });

      // ── Reset ──
      resetBtn.addEventListener('click', () => {
        checked = {};
        render();
      });

      // ── Edit mode toggle ──
      function toggleEditMode(force) {
        editMode = force !== undefined ? force : !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        editToggleBtn.textContent = editMode
          ? '✓ Done Editing'
          : '✏️ Edit List';
      }
      editToggleBtn.addEventListener('click', () => toggleEditMode());

      // ── Auth modal ──
      signInBtn.addEventListener('click', () => {
        authError.textContent = '';
        authEmailEl.value = '';
        authPassEl.value = '';
        authModal.classList.add('open');
        setTimeout(() => authEmailEl.focus(), 100);
      });
      closeModal.addEventListener('click', () =>
        authModal.classList.remove('open')
      );
      authModal.addEventListener('click', (e) => {
        if (e.target === authModal) authModal.classList.remove('open');
      });

      doSignIn.addEventListener('click', async () => {
        const email = authEmailEl.value.trim();
        const pass = authPassEl.value;
        if (!email || !pass) {
          authError.textContent = 'Please enter email and password.';
          return;
        }
        doSignIn.textContent = 'Signing in…';
        doSignIn.disabled = true;
        try {
          await signInWithEmailAndPassword(auth, email, pass);
          authModal.classList.remove('open');
        } catch (err) {
          authError.textContent = friendlyError(err.code);
        } finally {
          doSignIn.textContent = 'Sign In';
          doSignIn.disabled = false;
        }
      });
      authPassEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSignIn.click();
      });

      signOutBtn.addEventListener('click', () => signOut(auth));

      // ── Helpers ──
      function escHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }
      function friendlyError(code) {
        const map = {
          'auth/user-not-found': 'No account found with that email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/invalid-email': 'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        return map[code] || 'Sign-in failed. Please try again.';
      }
    </script>
  </body>
</html>
