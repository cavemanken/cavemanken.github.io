          <div class="photo-thumb">
            <img src="${url}" alt="">
            <button class="remove-photo" onclick="removePhoto(${i},'${mode}')">✕</button>
          </div>`
          )
          .join('');
      }

      function deleteStorageFile(url) {
        // Convert a Firebase Storage download URL to a storage ref and delete it.
        // Silently ignores errors (e.g. file already gone, external URLs).
        try {
          const ref = firebase.storage().refFromURL(url);
          ref.delete().catch(() => {});
        } catch (e) {
          // refFromURL throws if the URL isn't a Firebase Storage URL — ignore
        }
      }

      function removePhoto(i, mode) {
        const confirmed = confirm(
          'Remove this photo? This cannot be undone once you save.'
        );
        if (!confirmed) return;
        const [removed] = pendingPhotos.splice(i, 1);
        removedPhotos.push(removed); // track for deletion from Storage on save
        rerenderPhotoPreviews(mode);
      }

      function cancelForm(mode) {
        if (mode === 'edit') {
          showTab('view');
        } else {
          selectedPersonId
            ? renderPersonView(selectedPersonId)
            : renderWelcome();
          showTab('view');
        }
      }

      function savePerson(mode) {
        const g = (id) =>
          document.getElementById(`${mode}-${id}`)?.value?.trim() || '';
        const firstName = g('firstName');
        if (!firstName) {
          toast('First name is required.');
          return;
        }

        const relPersonEl = document.getElementById(`${mode}-rel-person`);
        const relSearchEl = document.getElementById(`${mode}-rel-search`);
        const relTypeEl = document.getElementById(`${mode}-rel-type`);

        const hasSelection = relPersonEl && relPersonEl.value;
        const hasSearchText = relSearchEl && relSearchEl.value.trim();

        if (hasSelection || hasSearchText) {
          const selectedName = relSearchEl?.value.trim() || 'someone';
          const relLabel =
            relTypeEl?.value === 'childOf' ? 'child of' : 'spouse of';
          const confirmed = confirm(
            `You selected "${selectedName}" as a ${relLabel} relationship but didn't click Add.\n\n` +
              `This relationship will NOT be saved.\n\nContinue saving without it?`
          );
          if (!confirmed) return;
        }

        const person = {
          firstName,
          middleName: g('middleName'),
          lastName: g('lastName'),
          dob: normalizeDate(g('dob')),
          dod: normalizeDate(g('dod')),
          bornLocation: g('bornLocation'),
          notes: g('notes'),
          photos: pendingPhotos,
          relationships: formRels[mode] || [],
          updatedAt: Date.now(),
        };

        if (mode === 'add') {
          person.createdAt = Date.now();
          const ref = dbRef.child(pendingPersonKey);
          ref
            .set(person)
            .then(() => {
              toast(`${fullName(person)} added to the family tree.`);
              selectedPersonId = pendingPersonKey;
              treeHistory.push(pendingPersonKey);
              treeHistoryIndex = treeHistory.length - 1;
              writeChangelog('ADD', pendingPersonKey, {
                name: fullName(person),
              });
              removedPhotos.forEach(deleteStorageFile);
              removedPhotos = [];
              pendingPersonKey = null;
              showTab('view');
            })
            .catch((e) => toast('Error: ' + e.message));
        } else {
          const oldPerson = allPeople[editingId] || {};
          const changedFields = {};
          [
            'firstName',
            'middleName',
            'lastName',
            'dob',
            'dod',
            'bornLocation',
            'notes',
          ].forEach((field) => {
            const oldVal = oldPerson[field] || '';
            const newVal = person[field] || '';
            if (oldVal !== newVal) {
              changedFields[field] = { from: oldVal, to: newVal };
            }
          });
          const oldRels = JSON.stringify(
            (oldPerson.relationships || [])
              .map((r) => `${r.type}:${r.targetId}`)
              .sort()
          );
          const newRels = JSON.stringify(
            (person.relationships || [])
              .map((r) => `${r.type}:${r.targetId}`)
              .sort()
          );
          if (oldRels !== newRels) {
            changedFields['relationships'] = {
              from: oldPerson.relationships || [],
              to: person.relationships || [],
            };
          }

          // Preserve the notable flag — don't wipe it on save
          if (oldPerson.notable) person.notable = oldPerson.notable;

          dbRef
            .child(editingId)
            .update(person)
            .then(() => {
              removedPhotos.forEach(deleteStorageFile);
              removedPhotos = [];
              toast('Record updated.');
              selectedPersonId = editingId;
              writeChangelog('EDIT', editingId, {
                name: fullName(person),
                changes: Object.keys(changedFields).length
                  ? changedFields
                  : { note: 'No field-level changes detected' },
              });
              showTab('view');
            })
            .catch((e) => toast('Error: ' + e.message));
        }
      }

      function normalizeDate(val) {
        if (!val) return '';
        val = val.trim();

        const slashMatch = val.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (slashMatch) {
          const [, month, day, year] = slashMatch;
          const months = [
            'January',
            'February',
            'March',
            'April',
            'May',
            'June',
            'July',
            'August',
            'September',
            'October',
            'November',
            'December',
          ];
          const monthName = months[parseInt(month, 10) - 1];
          if (!monthName) return val;
          return `${parseInt(day, 10)} ${monthName} ${year}`;
        }

        const isoMatch = val.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (isoMatch) {
          const [, year, month, day] = isoMatch;
          const months = [
            'January',
            'February',
            'March',
            'April',
            'May',
            'June',
            'July',
            'August',
            'September',
            'October',
            'November',
            'December',
          ];
          const monthName = months[parseInt(month, 10) - 1];
          const d = parseInt(day, 10);
          if (!monthName) return val;
          if (d === 0) return `${monthName} ${year}`;
          return `${d} ${monthName} ${year}`;
        }

        return val;
      }

      // ─────────────────────────────────────────────
      // DELETE
      // ─────────────────────────────────────────────
      // ─────────────────────────────────────────────
      // RELATIONSHIP FINDER
      // ─────────────────────────────────────────────

      // Build a graph of all edges: for each person, list connected people + edge label
      function buildRelGraph() {
        const graph = {}; // id → [{id, label}]
        const add = (a, b, label) => {
          if (!graph[a]) graph[a] = [];
          graph[a].push({ id: b, label });
        };
        Object.entries(allPeople).forEach(([id, p]) => {
          (p.relationships || []).forEach((r) => {
            if (!allPeople[r.targetId]) return;
            if (r.type === 'childOf') {
              // id is child of r.targetId
              add(id, r.targetId, 'child→parent');
              add(r.targetId, id, 'parent→child');
            } else if (r.type === 'spouseOf') {
              add(id, r.targetId, 'spouse');
              add(r.targetId, id, 'spouse');
            }
          });
        });
        return graph;
      }

      // BFS from startId to endId, returns path array [{id, label}] or null
      function findRelationshipPath(startId, endId) {
        if (startId === endId) return [{ id: startId, label: null }];
        const graph = buildRelGraph();
        const visited = new Set([startId]);
        // queue entries: { id, path: [{id, label}] }
        const queue = [{ id: startId, path: [{ id: startId, label: null }] }];
        while (queue.length) {
          const { id, path } = queue.shift();
          const neighbors = graph[id] || [];
          for (const { id: nid, label } of neighbors) {
            if (visited.has(nid)) continue;
            visited.add(nid);
            const newPath = [...path, { id: nid, label }];
            if (nid === endId) return newPath;
            queue.push({ id: nid, path: newPath });
          }
        }
        return null; // not connected
      }

      // Describe edge label as a readable sentence fragment
      // "A →[label]→ B"
      function edgeDescription(fromId, toId, label) {
        const a = allPeople[fromId];
        const b = allPeople[toId];
        if (!a || !b) return '';
        const aName = fullName(a);
        const bName = fullName(b);
        if (label === 'spouse')
          return `${aName} is the <b>spouse</b> of ${bName}`;
        if (label === 'child→parent')
          return `${aName} is a <b>child</b> of ${bName}`;
        if (label === 'parent→child')
          return `${aName} is the <b>parent</b> of ${bName}`;
        return `${aName} → ${bName}`;
      }

      // Summarise the full path as a one-line relationship description
      // Returns ordinal string: 1 → "1st", 2 → "2nd", etc.
      function ordinal(n) {
        if (n === 1) return '1st';
        if (n === 2) return '2nd';
        if (n === 3) return '3rd';
        return `${n}th`;
      }

      // Returns the plain relationship label for a pure blood path.
      // up   = steps from A up to common ancestor
      // down = steps from common ancestor down to B
      // Returns an object: { label, direction }
      //   direction: 'symmetric'  → "A and B are [label]s"
      //              'aToB'       → "B is A's [label]"  (B is the [label] of A)
      //              'bToA'       → "A is B's [label]"  (A is the [label] of B)
      function bloodRelInfo(up, down) {
        // ── Straight-line descendants of A ──
        if (up === 0) {
          if (down === 1) return { label: 'child', dir: 'aToB' };
          if (down === 2) return { label: 'grandchild', dir: 'aToB' };
          return {
            label: 'great-'.repeat(down - 2) + 'grandchild',
            dir: 'aToB',
          };
        }
        // ── Straight-line ancestors of A ──
        if (down === 0) {
          if (up === 1) return { label: 'parent', dir: 'aToB' };
          if (up === 2) return { label: 'grandparent', dir: 'aToB' };
          return {
            label: 'great-'.repeat(up - 2) + 'grandparent',
            dir: 'aToB',
          };
        }
        // ── Siblings ──
        if (up === 1 && down === 1)
          return { label: 'sibling', dir: 'symmetric' };

        // ── Aunt/Uncle and Niece/Nephew ──
        // up=1, down=2: A goes up 1 to parent, then down 2 to B
        //   → B is A's nephew/niece (A is the aunt/uncle)
        // up=2, down=1: A goes up 2 to grandparent, then down 1 to B
        //   → B is A's aunt/uncle (A is the niece/nephew)
        if (up === 1 && down === 2) return { label: 'aunt/uncle', dir: 'bToA' }; // B is A's aunt/uncle → phrase: "A is B's niece/nephew" ... actually B is the aunt
        if (up === 2 && down === 1) return { label: 'aunt/uncle', dir: 'aToB' }; // B is aunt/uncle of A

        // up=1, down>2: B is A's great-niece/nephew (A is the great-aunt/uncle)
        if (up === 1 && down > 2) {
          return {
            label: 'great-'.repeat(down - 2) + 'niece/nephew',
            dir: 'bToA',
          };
        }
        // up>2, down=1: B is A's great-aunt/uncle
        if (up > 2 && down === 1) {
          return { label: 'great-'.repeat(up - 2) + 'aunt/uncle', dir: 'aToB' };
        }

        // ── Cousins (both up≥2, down≥2) ──
        if (up >= 2 && down >= 2) {
          const degree = Math.min(up, down) - 1;
          const removed = Math.abs(up - down);
          const removedStr =
            removed === 0
              ? ''
              : removed === 1
              ? ' once removed'
              : removed === 2
              ? ' twice removed'
              : ` ${removed} times removed`;
          const label = `${ordinal(degree)} cousin${removedStr}`;
          // Cousins of the same degree are symmetric; removed cousins are directional
          // (the one further down is the "removed" one, but either phrasing works —
          // we'll just use symmetric phrasing for simplicity)
          // plural=false when "removed" is present — "1st cousins once removed" is wrong
          return { label, dir: 'symmetric', plural: removed === 0 };
        }

        return null;
      }

      function summarisePath(path) {
        if (path.length === 1) return 'Same person.';

        const a = fullName(allPeople[path[0].id]);
        const b = fullName(allPeople[path[path.length - 1].id]);

        // Count step types
        let upSteps = 0,
          downSteps = 0,
          spouseSteps = 0;
        for (let i = 1; i < path.length; i++) {
          const lbl = path[i].label;
          if (lbl === 'child→parent') upSteps++;
          else if (lbl === 'parent→child') downSteps++;
          else if (lbl === 'spouse') spouseSteps++;
        }

        // ── Direct 1-step ──
        if (path.length === 2) {
          if (path[1].label === 'spouse')
            return `${a} and ${b} are <b>spouses</b>.`;
          if (path[1].label === 'parent→child')
            return `${b} is the <b>child</b> of ${a}.`;
          if (path[1].label === 'child→parent')
            return `${b} is the <b>parent</b> of ${a}.`;
        }

        // ── Pure blood (no spouse steps) ──
        if (spouseSteps === 0) {
          const info = bloodRelInfo(upSteps, downSteps);
          if (info) {
            if (info.dir === 'symmetric') {
              const pl = info.plural !== false;
              return `${a} and ${b} are <b>${info.label}${pl ? 's' : ''}</b>.`;
            }
            if (info.dir === 'aToB')
              return `${b} is ${a}'s <b>${info.label}</b>.`;
            if (info.dir === 'bToA')
              return `${a} is ${b}'s <b>${info.label}</b>.`;
          }
        }

        // ── One spouse step → in-law ──
        if (spouseSteps === 1) {
          const firstLabel = path[1].label;
          const spouseAtStart = firstLabel === 'spouse';
          const bloodPath = spouseAtStart ? path.slice(1) : path.slice(0, -1);
          const bUp = bloodPath.filter(
            (n) => n.label === 'child→parent'
          ).length;
          const bDown = bloodPath.filter(
            (n) => n.label === 'parent→child'
          ).length;
          const info = bloodRelInfo(bUp, bDown);
          if (info) {
            if (spouseAtStart) {
              // A is spouse of X; X →blood→ B
              // So A is B's [blood-rel]-in-law (using X's relationship to B)
              if (info.dir === 'aToB' || info.dir === 'symmetric')
                return `${a} is ${b}'s <b>${info.label}-in-law</b>.`;
              if (info.dir === 'bToA')
                return `${b} is ${a}'s <b>${info.label}-in-law</b>.`;
            } else {
              // A →blood→ X; X is spouse of B
              if (info.dir === 'aToB')
                return `${b} is ${a}'s <b>${info.label}-in-law</b>.`;
              if (info.dir === 'bToA' || info.dir === 'symmetric')
                return `${a} is ${b}'s <b>${info.label}-in-law</b>.`;
            }
          }
        }

        // ── Fallback ──
        return (
          `${a} and ${b} are connected across <b>${
            path.length - 1
          } steps</b> ` +
          `(${upSteps} up, ${downSteps} down${
            spouseSteps ? ', ' + spouseSteps + ' by marriage' : ''
          }).`
        );
      }

      // Person picker dropdown for relationship finder
      let relFinderA = null,
        relFinderB = null;

      function renderRelationshipFinder() {
        const panel = document.getElementById('panel-relate');
        panel.innerHTML = `
          <div class="form-card" style="max-width:680px;">
            <h2 style="font-size:1.3rem;">🔗 How Are They Related?</h2>
            <p style="color:var(--muted);font-style:italic;margin-bottom:24px;font-size:0.95rem;">
              Select two family members to find out how (or if) they are related.
            </p>
            <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start;margin-bottom:20px;">
              ${relPersonPicker('relate-a', 'Person A', relFinderA)}
              <div style="padding-top:28px;text-align:center;font-size:1.4rem;color:var(--sepia-light);">↔</div>
              ${relPersonPicker('relate-b', 'Person B', relFinderB)}
            </div>
            <button class="btn btn-primary" onclick="runRelationshipFinder()" style="min-width:180px;">Find Relationship</button>
            <div id="relate-result" style="margin-top:24px;"></div>
          </div>`;
        // If a person is currently selected, pre-fill slot A
        if (selectedPersonId && !relFinderA) {
          relFinderA = selectedPersonId;
          refreshRelPicker('relate-a', relFinderA);
        }
      }

      function relPersonPicker(slot, label, preselectedId) {
        const p = preselectedId ? allPeople[preselectedId] : null;
        return `
          <div>
            <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;">${label}</div>
            <div style="position:relative;">
              <input type="text" id="${slot}-search"
                placeholder="Type a name…"
                autocomplete="off"
                value="${p ? esc(fullName(p)) : ''}"
                oninput="relPickerInput('${slot}')"
                onfocus="relPickerFocus('${slot}')"
                onkeydown="relPickerKeydown(event,'${slot}')"
                style="width:100%;font-family:'Crimson Pro',serif;font-size:1rem;padding:9px 28px 9px 12px;border:1px solid var(--card-border);border-radius:4px;background:var(--parchment);color:var(--ink);outline:none;"
              />
              <span id="${slot}-clear" onclick="relPickerClear('${slot}')"
                style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);${
                  p ? '' : 'display:none;'
                }font-size:1rem;line-height:1;">✕</span>
              <ul id="${slot}-dropdown" style="
                display:none;position:absolute;top:100%;left:0;right:0;
                background:var(--card-bg);border:1px solid var(--card-border);
                border-top:none;border-radius:0 0 6px 6px;max-height:220px;
                overflow-y:auto;z-index:300;list-style:none;margin:0;padding:0;
                box-shadow:0 4px 12px var(--shadow);"></ul>
              <input type="hidden" id="${slot}-value" value="${
          preselectedId || ''
        }" />
            </div>
          </div>`;
      }

      function refreshRelPicker(slot, personId) {
        const p = allPeople[personId];
        if (!p) return;
        const inp = document.getElementById(`${slot}-search`);
        const hid = document.getElementById(`${slot}-value`);
        const clr = document.getElementById(`${slot}-clear`);
        if (inp) inp.value = fullName(p);
        if (hid) hid.value = personId;
        if (clr) clr.style.display = 'inline';
      }

      function relPickerInput(slot) {
        const q = document.getElementById(`${slot}-search`).value.toLowerCase();
        document.getElementById(`${slot}-value`).value = '';
        const clr = document.getElementById(`${slot}-clear`);
        clr.style.display = q ? 'inline' : 'none';
        relPickerShowDropdown(slot, q);
      }

      function relPickerFocus(slot) {
        const q = document.getElementById(`${slot}-search`).value.toLowerCase();
        relPickerShowDropdown(slot, q);
      }

      function relPickerShowDropdown(slot, q) {
        const ul = document.getElementById(`${slot}-dropdown`);
        const results = Object.entries(allPeople)
          .filter(([, p]) => fullName(p).toLowerCase().includes(q))
          .sort(([, a], [, b]) => fullName(a).localeCompare(fullName(b)))
          .slice(0, 60);
        if (!results.length) {
          ul.innerHTML = `<li style="padding:10px 12px;color:var(--muted);font-style:italic;font-size:0.9rem;">No matches</li>`;
        } else {
          ul.innerHTML = results
            .map(([pid, p]) => {
              const dates = lifespan(p);
              return `<li onclick="relPickerSelect('${slot}','${pid}','${esc(
                fullName(p)
              )}')"
              style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--parchment-dark);"
              onmouseover="this.style.background='var(--parchment-dark)'"
              onmouseout="this.style.background=''">
              <span style="font-weight:500;font-size:0.95rem;">${fullName(
                p
              )}</span>
              ${
                dates
                  ? `<span style="font-size:0.78rem;color:var(--muted);font-style:italic;margin-left:6px;">${dates}</span>`
                  : ''
              }
            </li>`;
            })
            .join('');
        }
        ul.style.display = 'block';
      }

      function relPickerSelect(slot, pid, name) {
        document.getElementById(`${slot}-search`).value = name;
        document.getElementById(`${slot}-value`).value = pid;
        document.getElementById(`${slot}-clear`).style.display = 'inline';
        document.getElementById(`${slot}-dropdown`).style.display = 'none';
        if (slot === 'relate-a') relFinderA = pid;
        if (slot === 'relate-b') relFinderB = pid;
      }

      function relPickerClear(slot) {
        document.getElementById(`${slot}-search`).value = '';
        document.getElementById(`${slot}-value`).value = '';
        document.getElementById(`${slot}-clear`).style.display = 'none';
        document.getElementById(`${slot}-dropdown`).style.display = 'none';
        if (slot === 'relate-a') relFinderA = null;
        if (slot === 'relate-b') relFinderB = null;
        document.getElementById(`${slot}-search`).focus();
      }

      function relPickerKeydown(e, slot) {
        const ul = document.getElementById(`${slot}-dropdown`);
        const items = [...ul.querySelectorAll('li')];
        if (!items.length) return;
        const active = ul.querySelector('li.rp-active');
        let idx = items.indexOf(active);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (active) active.classList.remove('rp-active');
          idx = idx < items.length - 1 ? idx + 1 : 0;
          items[idx].classList.add('rp-active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (active) active.classList.remove('rp-active');
          idx = idx > 0 ? idx - 1 : items.length - 1;
          items[idx].classList.add('rp-active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (active) active.click();
          else if (items.length === 1) items[0].click();
        } else if (e.key === 'Escape') {
          ul.style.display = 'none';
        }
      }

      function runRelationshipFinder() {
        const aId = document.getElementById('relate-a-value')?.value;
        const bId = document.getElementById('relate-b-value')?.value;
        const resultEl = document.getElementById('relate-result');
        if (!aId || !bId) {
          resultEl.innerHTML = `<p style="color:var(--red);font-style:italic;">Please select both people.</p>`;
          return;
        }
        if (aId === bId) {
          resultEl.innerHTML = `<p style="color:var(--muted);font-style:italic;">That's the same person!</p>`;
          return;
        }
        const path = findRelationshipPath(aId, bId);
        if (!path) {
          const a = allPeople[aId],
            b = allPeople[bId];
          resultEl.innerHTML = `
            <div style="background:var(--parchment-dark);border:1px solid var(--card-border);border-radius:8px;padding:20px 24px;">
              <div style="font-size:1.1rem;font-weight:500;color:var(--ink);margin-bottom:8px;">No connection found</div>
              <p style="color:var(--muted);font-style:italic;font-size:0.95rem;">
                <b>${fullName(a)}</b> and <b>${fullName(
            b
          )}</b> do not appear to be related through
                any recorded relationships in this tree. They may be from unconnected branches.
              </p>
            </div>`;
          return;
        }

        // Summary banner
        const summary = summarisePath(path);
        const steps = path.length - 1;

        // Build step-by-step path cards
        const stepCards = path
          .map((node, i) => {
            const p = allPeople[node.id];
            if (!p) return '';
            const photo = (p.photos || [])[0];
            const photoHtml =
              photo && !photo.toLowerCase().includes('.pdf')
                ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">`
                : `<span style="font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--muted);">${

      function confirmDelete(id) {

      function deletePerson(id) {
        const p = allPeople[id];
        const name = p ? fullName(p) : id;
        // Delete all photos from Storage first (fire-and-forget, don't block on errors)
        (p?.photos || []).forEach(deleteStorageFile);
        dbRef
          .child(id)
          .remove()
          .then(() => {
            toast('Record deleted.');
            writeChangelog('DELETE', id, { name });
            selectedPersonId = null;
            closeModal();
            renderWelcome();

      function showChangelog() {
        if (!currentUser) {
          toast('Sign in to view the changelog.');
          return;
        }

        Promise.all([
          db
            .ref('genealogy/' + genealogySubPath + '/changelog')
            .orderByChild('timestamp')
            .limitToLast(100)
            .once('value'),
          db
            .ref('genealogy/' + genealogySubPath + '/loginLog')
            .orderByChild('timestamp')
            .limitToLast(200)
            .once('value'),
        ]).then(([changeSnap, loginSnap]) => {
          const entries = [];
          changeSnap.forEach((child) => entries.push(child.val()));
          entries.reverse();

          const logins = [];
          loginSnap.forEach((child) => logins.push(child.val()));
          logins.reverse();

          const fmtDate = (ts) => {
            const d = new Date(ts);
            return {
              date: d.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
              }),
              time: d.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
              }),
            };
          };

          const rows = entries
            .map((e) => {
              const { date, time } = fmtDate(e.timestamp);
              const badge =
                {
                  ADD: `<span style="background:#1a3a2a;color:#4caf84;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;">ADD</span>`,
                  EDIT: `<span style="background:#2a2a0a;color:#c9a84c;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;">EDIT</span>`,
                  DELETE: `<span style="background:#3a0a0a;color:#f44336;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;">DELETE</span>`,
                }[e.action] || e.action;

                <td style="padding:8px 10px;white-space:nowrap;">${date}<br><span style="font-size:0.75rem;color:var(--muted)">${time}</span></td>
                <td style="padding:8px 10px;">${badge}</td>
                <td style="padding:8px 10px;font-weight:500;">${
                  e.personName || '—'

                <td style="padding:8px 10px;font-size:0.8rem;color:var(--muted);">${
                  e.email || e.uid
                }</td>
              </tr>`;
            })
            .join('');

          const loginRows = logins
            .map((e) => {
              const { date, time } = fmtDate(e.timestamp);
              const badge =
                e.action === 'signup'
                  ? `<span style="background:#1a2a3a;color:#64b5f6;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;">NEW</span>`
                  : `<span style="background:#1a1a2a;color:#b39ddb;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;">LOGIN</span>`;
              return `<tr style="border-bottom:1px solid var(--card-border);">
                <td style="padding:8px 10px;white-space:nowrap;">${date}<br><span style="font-size:0.75rem;color:var(--muted)">${time}</span></td>
                <td style="padding:8px 10px;">${badge}</td>
                <td style="padding:8px 10px;font-size:0.9rem;color:var(--muted);">${e.email}</td>
              </tr>`;
            })
            .join('');

          document.getElementById('modal-body').innerHTML = `
              <h3 style="margin-bottom:16px;">📋 Change Log</h3>
              <div style="overflow-x:auto;max-height:40vh;overflow-y:auto;margin-bottom:20px;">
                <table style="width:100%;border-collapse:collapse;font-family:'Crimson Pro',serif;font-size:0.95rem;">
                  <thead>
                    <tr style="border-bottom:2px solid var(--card-border);color:var(--muted);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;">
                      <th style="padding:6px 10px;text-align:left;">When</th>
                      <th style="padding:6px 10px;text-align:left;">Action</th>
                      <th style="padding:6px 10px;text-align:left;">Person</th>
                      <th style="padding:6px 10px;text-align:left;">By</th>
                    </tr>
                  </thead>
                  <tbody>${
                    rows ||
                    '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--muted);font-style:italic;">No changes recorded yet.</td></tr>'
                  }</tbody>
                </table>
              </div>
              <h3 style="margin-bottom:12px;font-size:1.1rem;">🔑 Login Log</h3>
              <div style="overflow-x:auto;max-height:25vh;overflow-y:auto;">
                <table style="width:100%;border-collapse:collapse;font-family:'Crimson Pro',serif;font-size:0.95rem;">
                  <thead>
                    <tr style="border-bottom:2px solid var(--card-border);color:var(--muted);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;">
                      <th style="padding:6px 10px;text-align:left;">When</th>
                      <th style="padding:6px 10px;text-align:left;">Type</th>
                      <th style="padding:6px 10px;text-align:left;">Email</th>
                    </tr>
                  </thead>
                  <tbody>${
                    loginRows ||
                    '<tr><td colspan="3" style="padding:20px;text-align:center;color:var(--muted);font-style:italic;">No logins recorded yet.</td></tr>'
                  }</tbody>
                </table>
              </div>
              <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">Close</button>
              </div>`;
          document.getElementById('modal').style.display = 'flex';
        });
      }

      // ─────────────────────────────────────────────
      // MODAL & LIGHTBOX
      // ─────────────────────────────────────────────
      function closeModal(e) {
        if (!e || e.target.id === 'modal') {
          document.getElementById('modal').style.display = 'none';
          pendingGEDCOMData = null;
        }
      }
      function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
      }
      function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
      }

      // ─────────────────────────────────────────────
      // UTIL
      // ─────────────────────────────────────────────
      function esc(v) {
        return (v || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      }
      function escHtml(s) {
        return (s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
      }

      function closeAuthModal(e) {
        if (!e || e.target.id === 'auth-screen') {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('auth-error').style.display = 'none';
          document.getElementById('auth-error').textContent = '';
        }
      }
      function filterRelPeople(mode) {
        const q = document
          .getElementById(`${mode}-rel-search`)
          .value.toLowerCase();
        const clearEl = document.getElementById(`${mode}-rel-clear`);
        clearEl.style.display = q ? 'block' : 'none';

        document.getElementById(`${mode}-rel-person`).value = '';

        const results = Object.entries(allPeople)
          .filter(([pid]) => pid !== editingId)
          .filter(([, p]) => fullName(p).toLowerCase().includes(q))
          .sort(([, a], [, b]) => fullName(a).localeCompare(fullName(b)))
          .slice(0, 50);

        renderRelDropdown(mode, results);
        showRelDropdown(mode);
      }

      function renderRelDropdown(mode, results) {
        const ul = document.getElementById(`${mode}-rel-dropdown`);
        if (results.length === 0) {
          ul.innerHTML = `<li style="padding:10px 12px;color:var(--muted);font-style:italic;font-size:0.9rem;">No matches found</li>`;
        } else {
          ul.innerHTML = results
            .map(([pid, p]) => {
              const dates = lifespan(p);
              return `<li
              onclick="selectRelPerson('${mode}','${pid}','${esc(
                fullName(p)
              )}')"
              style="
                padding:8px 12px;
                cursor:pointer;
                display:flex;
                flex-direction:column;
                border-bottom:1px solid var(--parchment-dark);
                transition:background 0.12s;
              "
              onmouseover="this.style.background='var(--parchment-dark)'"
              onmouseout="this.style.background=''">
              <span style="font-weight:500;font-size:0.95rem;">${fullName(
                p
              )}</span>
              ${
                dates
                  ? `<span style="font-size:0.78rem;color:var(--muted);font-style:italic;">${dates}</span>`
                  : ''
              }
            </li>`;
            })

        }
      }

      function showRelDropdown(mode) {
        const search = document.getElementById(`${mode}-rel-search`);
        const ul = document.getElementById(`${mode}-rel-dropdown`);

        if (!search.value && ul.innerHTML === '') {
          const all = Object.entries(allPeople)
            .filter(([pid]) => pid !== editingId)
            .sort(([, a], [, b]) => fullName(a).localeCompare(fullName(b)))
            .slice(0, 50);
          renderRelDropdown(mode, all);
        }
        ul.style.display = 'block';
      }

      function selectRelPerson(mode, pid, name) {
        document.getElementById(`${mode}-rel-person`).value = pid;
        document.getElementById(`${mode}-rel-search`).value = name;
        document.getElementById(`${mode}-rel-clear`).style.display = 'block';
        document.getElementById(`${mode}-rel-dropdown`).style.display = 'none';
      }

      function clearRelSearch(mode) {
        document.getElementById(`${mode}-rel-search`).value = '';
        document.getElementById(`${mode}-rel-person`).value = '';
        document.getElementById(`${mode}-rel-clear`).style.display = 'none';
        document.getElementById(`${mode}-rel-dropdown`).innerHTML = '';
        document.getElementById(`${mode}-rel-dropdown`).style.display = 'none';
        document.getElementById(`${mode}-rel-search`).focus();
      }
      function relSearchKeydown(e, mode) {
        const ul = document.getElementById(`${mode}-rel-dropdown`);
        const items = [...ul.querySelectorAll('li')];
        if (!items.length) return;

        const active = ul.querySelector('li.rel-active');
        let idx = items.indexOf(active);

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (active) active.classList.remove('rel-active');
          idx = idx < items.length - 1 ? idx + 1 : 0;
          items[idx].classList.add('rel-active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (active) active.classList.remove('rel-active');
          idx = idx > 0 ? idx - 1 : items.length - 1;
          items[idx].classList.add('rel-active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (active) {
            active.click();
          } else if (items.length === 1) {
            items[0].click();
          }
        } else if (e.key === 'Escape') {
          ul.style.display = 'none';
        }
      }
      function writeChangelog(action, personId, details) {
        if (!currentUser) return;
        const ref = db
          .ref('genealogy/' + genealogySubPath + '/changelog')
          .push();
        ref.set({
          action,
          personId,
          personName: details.name || '',
          uid: currentUser.uid,
          email: currentUser.email,
          timestamp: Date.now(),
          changes: details.changes || null,
        });
      }

      // ─────────────────────────────────────────────
      // ANCESTOR TREE
      // ─────────────────────────────────────────────
      function showAncestorTree(rootId, maxGen) {
        const p = allPeople[rootId];
        if (!p) return;

        const generations = [];
        const visited = new Set();
        const parentMap = {};

        if (maxGen === undefined) maxGen = window._ancestorMaxGen || 5;
        window._ancestorMaxGen = maxGen;
        window._ancestorRootId = rootId;

        let currentGen = [rootId];
        visited.add(rootId);

        while (currentGen.length > 0 && generations.length < maxGen) {
          generations.push(currentGen);
          const nextGen = [];
          currentGen.forEach((id) => {
            const parents = findRelatives(id, 'childOf');
            parentMap[id] = [];
            parents.forEach((pid) => {
              if (allPeople[pid]) {
                parentMap[id].push(pid);
                if (!visited.has(pid)) {
                  visited.add(pid);
                  nextGen.push(pid);
                }
              }
            });
          });
          currentGen = nextGen;
        }

        document.getElementById('panel-view').innerHTML = `
          <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;flex:1;">
              🌿 Ancestor Tree — ${fullName(p)}
            </h3>
            <span style="font-size:0.85rem;color:var(--muted);font-style:italic;">
              ${visited.size} ancestors · ${generations.length - 1} generation${
          generations.length !== 2 ? 's' : ''
        }
            </span>
            <div style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--muted);">
              <span style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;">Generations:</span>
              ${[3,4,5,6,99].map(n => `<button class="btn btn-ghost btn-sm" onclick="showAncestorTree('${rootId}',${n})"
                style="padding:3px 9px;font-size:0.82rem;${(maxGen||5)===n?'background:var(--ink);color:var(--parchment);border-color:var(--ink);':''}"
              >${n===99?'All':n}</button>`).join('')}
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="btn btn-ghost btn-sm" onclick="window._ancestorZoom(-0.15)" title="Zoom out" style="font-size:1.1rem;padding:4px 10px;">−</button>
              <span id="ancestor-zoom-label" style="font-size:0.82rem;color:var(--muted);min-width:38px;text-align:center;">100%</span>
              <button class="btn btn-ghost btn-sm" onclick="window._ancestorZoom(+0.15)" title="Zoom in"  style="font-size:1.1rem;padding:4px 10px;">+</button>
              <button class="btn btn-ghost btn-sm" onclick="window._ancestorZoomReset()" title="Reset zoom" style="font-size:0.8rem;padding:4px 10px;">Reset</button>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="renderPersonView('${rootId}')">✕ Close</button>
          </div>
          <div id="ancestor-scroll" style="overflow:auto;padding-bottom:20px;position:relative;cursor:grab;">
            <div id="ancestor-grid" style="position:relative;display:inline-block;min-width:100%;transform-origin:top left;">
              <svg id="ancestor-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;"></svg>
              <div id="ancestor-gens" style="display:flex;flex-direction:column;gap:40px;padding:20px 30px;"></div>
            </div>
          </div>`;

        const gensEl = document.getElementById('ancestor-gens');
        const cardEls = {};

        generations.forEach((gen, gi) => {
          const label = ancestorGenLabel(gi);
          const missing = countMissingParents(gen, gi, generations);
          const genRow = document.createElement('div');
          genRow.style.cssText =
            'display:flex;flex-direction:column;align-items:center;';

          const labelEl = document.createElement('div');
          labelEl.style.cssText = `
            font-size:0.72rem;text-transform:uppercase;letter-spacing:0.14em;
            color:var(--muted);text-align:center;margin-bottom:10px;font-weight:500;
            display:flex;align-items:center;justify-content:center;gap:10px;`;
          labelEl.innerHTML = `${label}
            <span style="font-size:0.7rem;color:var(--card-border);">
              (${gen.length} known${missing > 0 ? `, ${missing} missing` : ''})
            </span>`;
          genRow.appendChild(labelEl);

          const cardsRow = document.createElement('div');
          cardsRow.style.cssText =
            'display:flex;gap:16px;justify-content:center;flex-wrap:nowrap;';

          gen.forEach((id) => {
            const person = allPeople[id];
            if (!person) return;

            const photo = (person.photos || [])[0];
            const photoHtml = photo
              ? photo.toLowerCase().includes('.pdf')
                ? `<span style="font-size:1rem;">📄</span>`
                : `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">`
              : `<span style="font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--muted);">${
                  (person.firstName || '?')[0]
                }</span>`;

            const hasParents = (parentMap[id] || []).length > 0;
            const isFocus = gi === 0;

            const card = document.createElement('div');
            card.dataset.personId = id;
            card.style.cssText = `
              background:${isFocus ? '#fff8f0' : 'var(--card-bg)'};
              border:${
                isFocus
                  ? '2px solid var(--accent)'
                  : '1px solid var(--card-border)'
              };
              border-radius:6px;
              padding:10px 12px;
              min-width:130px;
              max-width:160px;
              text-align:center;
              cursor:pointer;
              box-shadow:${
                person.notable
                  ? '0 0 0 2px var(--sepia-light), 0 2px 8px var(--shadow)'
                  : '0 2px 8px var(--shadow)'
              };
              transition:all 0.18s;
              flex-shrink:0;
              position:relative;`;

            card.innerHTML = `
              ${
                person.notable
                  ? `<span style="position:absolute;top:4px;right:6px;font-size:0.8rem;color:var(--sepia-light);">⭐</span>`
                  : ''
              }
              <div style="width:44px;height:44px;border-radius:50%;margin:0 auto 7px;
                border:2px solid var(--card-border);background:var(--parchment-dark);
                overflow:hidden;display:flex;align-items:center;justify-content:center;">
                ${photoHtml}
              </div>
              <div style="font-size:0.85rem;font-weight:600;color:var(--ink);line-height:1.2;">${fullName(
                person
              )}</div>
              <div style="font-size:0.72rem;color:var(--muted);font-style:italic;margin-top:2px;">${lifespan(
                person
              )}</div>
              ${
                !hasParents && gi > 0
                  ? `<div style="font-size:0.62rem;color:var(--accent-soft);margin-top:4px;text-transform:uppercase;letter-spacing:0.08em;">End of line</div>`
                  : ''
              }
              ${
                isFocus
                  ? `<div style="font-size:0.62rem;color:var(--accent-soft);margin-top:4px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">★ Focus</div>`
                  : ''
              }`;

            card.addEventListener('mouseover', () => {
              card.style.borderColor = 'var(--sepia)';
              card.style.transform = 'translateY(-1px)';
            });
            card.addEventListener('mouseout', () => {
              card.style.borderColor = isFocus
                ? 'var(--accent)'
                : 'var(--card-border)';
              card.style.transform = '';
            });
            card.addEventListener('click', () => selectPerson(id));

            cardsRow.appendChild(card);
            cardEls[id] = card;
          });

          genRow.appendChild(cardsRow);
          gensEl.appendChild(genRow);
        });

        requestAnimationFrame(() =>
          drawAncestorLines(generations, parentMap, cardEls)
        );

        // ── Zoom state ──
        let _ancestorScale = 1.0;

        function ancestorZoom(delta) {
          _ancestorScale = Math.min(
            2.5,
            Math.max(0.25, _ancestorScale + delta)
          );
          applyAncestorZoom();
        }
        function ancestorZoomReset() {
          _ancestorScale = 1.0;
          applyAncestorZoom();
        }
        function applyAncestorZoom() {
          const grid = document.getElementById('ancestor-grid');
          const label = document.getElementById('ancestor-zoom-label');
          if (!grid) return;
          grid.style.transform = `scale(${_ancestorScale})`;
          // Shrink the scroll container's logical size to match scaled content
          // so scrollbars don't over-extend
          grid.style.marginBottom = `${
            (_ancestorScale - 1) * grid.offsetHeight
          }px`;
          if (label) label.textContent = Math.round(_ancestorScale * 100) + '%';
        }

        // Mouse-wheel zoom (Ctrl/Cmd + scroll, or just scroll on the tree)
        const scrollEl = document.getElementById('ancestor-scroll');
        if (scrollEl) {
          scrollEl.addEventListener(
            'wheel',
            (e) => {
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                ancestorZoom(e.deltaY < 0 ? 0.1 : -0.1);
              }
            },
            { passive: false }
          );
        }

        // Expose so the inline onclick buttons (which are outside this closure scope) can reach them
        window._ancestorZoom = ancestorZoom;
        window._ancestorZoomReset = ancestorZoomReset;
      }

      function drawAncestorLines(generations, parentMap, cardEls) {
        const svg = document.getElementById('ancestor-svg');
        const grid = document.getElementById('ancestor-grid');
        if (!svg || !grid) return;

        const gridRect = grid.getBoundingClientRect();
        const scrollEl = document.getElementById('ancestor-scroll');
        const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
        const scrollLeft = scrollEl ? scrollEl.scrollLeft : 0;

        svg.setAttribute('width', grid.scrollWidth);
        svg.setAttribute('height', grid.scrollHeight);
        svg.innerHTML = '';

        const getCardCenter = (el) => {
          if (!el) return null;
          const r = el.getBoundingClientRect();
          return {
            x: r.left - gridRect.left + scrollLeft + r.width / 2,
            y: r.top - gridRect.top + scrollTop + r.height / 2,
            top: r.top - gridRect.top + scrollTop,
            bottom: r.top - gridRect.top + scrollTop + r.height,
            left: r.left - gridRect.left + scrollLeft,
            right: r.left - gridRect.left + scrollLeft + r.width,
          };
        };

        generations.forEach((gen, gi) => {
          if (gi === 0) return;
          gen.forEach((parentId) => {
            Object.entries(parentMap).forEach(([childId, parents]) => {
              if (!parents.includes(parentId)) return;

              const childEl = cardEls[childId];
              const parentEl = cardEls[parentId];
              if (!childEl || !parentEl) return;

              const child = getCardCenter(childEl);
              const parent = getCardCenter(parentEl);
              if (!child || !parent) return;

              const x1 = parent.x;
              const y1 = parent.top;
              const x2 = child.x;
              const y2 = child.bottom;
              const midY = (y1 + y2) / 2;

              const path = document.createElementNS(
                'http://www.w3.org/2000/svg',
                'path'
              );
              path.setAttribute(
                'd',
                `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`
              );
              path.setAttribute('stroke', 'var(--card-border)');
              path.setAttribute('stroke-width', '1.5');
              path.setAttribute('fill', 'none');
              path.setAttribute('stroke-opacity', '0.7');
              svg.appendChild(path);
            });
          });
        });

        const focusCard = Object.values(cardEls)[0];
        if (focusCard && scrollEl) {
          const focusRect = focusCard.getBoundingClientRect();
          const gridLeft = gridRect.left;
          const focusMidX =
            focusRect.left - gridLeft + scrollLeft + focusRect.width / 2;
          const containerW = scrollEl.clientWidth;
          scrollEl.scrollLeft = focusMidX - containerW / 2;
          scrollEl.scrollTop = 0;
        }
      }

      function countMissingParents(gen, genIndex, generations) {
        if (genIndex === 0) return 0;
        const prevGen = generations[genIndex - 1] || [];
        const expected = prevGen.length * 2;
        const actual = gen.length;
        return Math.max(0, expected - actual);
      }

      function ancestorGenLabel(gi) {
        if (gi === 0) return 'Focus';
        if (gi === 1) return 'Parents';
        if (gi === 2) return 'Grandparents';
        if (gi === 3) return 'Great-Grandparents';
        const n = gi - 2;
        const suffix = n === 1 ? 'st' : n === 2 ? 'nd' : n === 3 ? 'rd' : 'th';
        return `${n}${suffix} Great-Grandparents`;
      }

      // ─────────────────────────────────────────────
      // GEDCOM IMPORT
      // ─────────────────────────────────────────────
      function importGEDCOM(input) {
        if (!currentUser) {
          toast('You must be signed in to import data.');
          return;
        }
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const text = e.target.result;
            const result = parseGEDCOM(text);
            previewGEDCOMImport(result);
          } catch (err) {
            toast('Error parsing GEDCOM: ' + err.message);
            console.error(err);
          }
        };
        reader.readAsText(file, 'UTF-8');
        input.value = '';
      }

      function parseGEDCOM(text) {
        const lines = text
          .replace(/\r\n/g, '\n')
          .replace(/\r/g, '\n')
          .split('\n');

        const individuals = {};
        const families = {};

        let currentId = null;
        let currentType = null;
        let currentTag = null;

        lines.forEach((rawLine) => {
          const line = rawLine.trim();
          if (!line) return;

          const parts = line.split(/\s+/);
          if (parts.length < 2) return;

          const level = parseInt(parts[0]);
          if (isNaN(level)) return;

          const tagOrId = parts[1];
          const value = parts.slice(2).join(' ');

          if (level === 0) {
            currentId = null;
            currentType = null;
            currentTag = null;

            if (tagOrId.startsWith('@') && value === 'INDI') {
              currentId = tagOrId;
              currentType = 'INDI';
              individuals[currentId] = {
                id: currentId,
                firstName: '',
                middleName: '',
                lastName: '',
                dob: '',
                dod: '',
                bornLocation: '',
                notes: '',
                photos: [],
                sex: '',
              };
            } else if (tagOrId.startsWith('@') && value === 'FAM') {
              currentId = tagOrId;
              currentType = 'FAM';
              families[currentId] = { husb: null, wife: null, children: [] };
            }
            return;
          }

          if (!currentId) return;

          const tag = tagOrId;

          if (currentType === 'INDI') {
            const p = individuals[currentId];

            if (level === 1) {
              currentTag = tag;

              if (tag === 'NAME') {
                const lastMatch = value.match(/\/([^/]*)\//);
                p.lastName = lastMatch ? lastMatch[1].trim() : '';
                const given = value.replace(/\/[^/]*\//, '').trim();
                const givenParts = given.split(/\s+/).filter(Boolean);
                p.firstName = givenParts[0] || '';
                p.middleName = givenParts.slice(1).join(' ');
              }

              if (tag === 'SEX') p.sex = value;
              if (tag === 'NOTE') p.notes = value;
            }

            if (level === 2) {
              if (currentTag === 'BIRT') {
                if (tag === 'DATE') p.dob = value;
                if (tag === 'PLAC') p.bornLocation = value;
              }
              if (currentTag === 'DEAT') {
                if (tag === 'DATE') p.dod = value;
                if (tag === 'PLAC') {
                  if (value)
                    p.notes += (p.notes ? '\n' : '') + 'Death place: ' + value;
                }
              }
              if (tag === 'CONT' || tag === 'CONC') {
                if (currentTag === 'NOTE') {
                  p.notes += (tag === 'CONT' ? '\n' : '') + value;
                }
              }
              if (currentTag === 'OBJE' && tag === 'FILE') {
                p.photos.push(value);
              }
            }

            if (level === 3) {
              if (tag === 'CONT' || tag === 'CONC') {
                if (currentTag === 'NOTE') {
                  individuals[currentId].notes +=
                    (tag === 'CONT' ? '\n' : '') + value;
                }
              }
            }
          }

          if (currentType === 'FAM') {
            const f = families[currentId];
            if (level === 1) {
              currentTag = tag;
              if (tag === 'HUSB') f.husb = value.trim();
              if (tag === 'WIFE') f.wife = value.trim();
              if (tag === 'CHIL') f.children.push(value.trim());
            }
          }
        });
        return { individuals, families };
      }

      let pendingGEDCOMData = null;

      function previewGEDCOMImport({ individuals, families }) {
        pendingGEDCOMData = { individuals, families };

        const indiCount = Object.keys(individuals).length;
        const famCount = Object.keys(families).length;

        let relCount = 0;
        Object.values(families).forEach((f) => {
          if (f.husb && f.wife) relCount++;
          relCount += f.children.length * 2;
        });

        document.getElementById('modal-body').innerHTML = `
          <h3 style="margin-bottom:16px;">⬆ Import GEDCOM</h3>
          <p style="margin-bottom:16px;line-height:1.6;">Ready to import:</p>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;">

              <div style="font-size:1.8rem;font-weight:700;color:var(--accent);">${indiCount}</div>

            </div>
            <div style="background:var(--parchment-dark);border-radius:6px;padding:12px 20px;text-align:center;flex:1;">
              <div style="font-size:1.8rem;font-weight:700;color:var(--accent);">${famCount}</div>
              <div style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;">Families</div>
            </div>
            <div style="background:var(--parchment-dark);border-radius:6px;padding:12px 20px;text-align:center;flex:1;">
              <div style="font-size:1.8rem;font-weight:700;color:var(--accent);">${relCount}</div>
              <div style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;">Relationships</div>
            </div>
          </div>
          <p style="color:var(--muted);font-style:italic;font-size:0.9rem;margin-bottom:20px;line-height:1.6;">
            ⚠ This will ADD to your existing data — it will not overwrite or delete anyone already in the tree.
          </p>
          <div id="gedcom-progress" style="display:none;margin-bottom:12px;">
            <div style="background:var(--parchment-dark);border-radius:4px;height:8px;overflow:hidden;">
              <div id="gedcom-progress-bar" style="background:var(--sepia-light);height:100%;width:0%;transition:width 0.2s;"></div>
            </div>
            <div id="gedcom-progress-label" style="font-size:0.8rem;color:var(--muted);margin-top:6px;text-align:center;"></div>
          </div>
          <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="gedcom-confirm-btn" onclick="executeGEDCOMImport(pendingGEDCOMData)">
              Import ${indiCount} People
            </button>
          </div>`;
        document.getElementById('modal').style.display = 'flex';
      }

      async function executeGEDCOMImport({ individuals, families }) {
        const confirmBtn = document.getElementById('gedcom-confirm-btn');
        if (confirmBtn) confirmBtn.disabled = true;

        const progressWrap = document.getElementById('gedcom-progress');
        const progressBar = document.getElementById('gedcom-progress-bar');
        const progressLabel = document.getElementById('gedcom-progress-label');
        if (progressWrap) progressWrap.style.display = 'block';

        const gedcomIdToKey = {};
        const relUpdates = {};

        const indiEntries = Object.values(individuals);
        const total = indiEntries.length;
        let done = 0;

        for (const p of indiEntries) {
          const ref = dbRef.push();
          gedcomIdToKey[p.id] = ref.key;

          await ref.set({
            firstName: p.firstName || '',
            middleName: p.middleName || '',
            lastName: p.lastName || '',
            dob: p.dob || '',
            dod: p.dod || '',
            bornLocation: p.bornLocation || '',
            notes: (p.notes || '').trim(),
            photos: p.photos || [],
            relationships: [],
            createdAt: Date.now(),
            updatedAt: Date.now(),
          });

          done++;
          if (progressBar)
            progressBar.style.width = `${Math.round((done / total) * 50)}%`;
          if (progressLabel)
            progressLabel.textContent = `Writing people… ${done}/${total}`;
        }

        Object.values(families).forEach((f) => {
          const husbKey = f.husb ? gedcomIdToKey[f.husb] : null;
          const wifeKey = f.wife ? gedcomIdToKey[f.wife] : null;

          if (husbKey && wifeKey) {
            if (!relUpdates[husbKey]) relUpdates[husbKey] = [];
            if (
              !relUpdates[husbKey].find(
                (r) => r.type === 'spouseOf' && r.targetId === wifeKey
              )
            ) {
              relUpdates[husbKey].push({ type: 'spouseOf', targetId: wifeKey });
            }
          }

          f.children.forEach((childGedcomId) => {
            const childKey = gedcomIdToKey[childGedcomId];
            if (!childKey) return;
            if (!relUpdates[childKey]) relUpdates[childKey] = [];
            if (
              husbKey &&
              !relUpdates[childKey].find(
                (r) => r.type === 'childOf' && r.targetId === husbKey
              )
            ) {
              relUpdates[childKey].push({ type: 'childOf', targetId: husbKey });
            }
            if (
              wifeKey &&
              !relUpdates[childKey].find(
                (r) => r.type === 'childOf' && r.targetId === wifeKey
              )
            ) {
              relUpdates[childKey].push({ type: 'childOf', targetId: wifeKey });
            }
          });
        });

        const relEntries = Object.entries(relUpdates);
        const relTotal = relEntries.length;
        let relDone = 0;

        for (const [key, rels] of relEntries) {
          await dbRef.child(key).update({
            relationships: rels,
            updatedAt: Date.now(),
          });
          relDone++;
          if (progressBar)
            progressBar.style.width = `${
              50 + Math.round((relDone / relTotal) * 50)
            }%`;
          if (progressLabel)
            progressLabel.textContent = `Writing relationships… ${relDone}/${relTotal}`;
        }

        writeChangelog('ADD', 'GEDCOM_IMPORT', {
          name: `GEDCOM import — ${total} people, ${
            Object.keys(families).length
          } families`,
        });

        if (progressBar) progressBar.style.width = '100%';
        if (progressLabel) progressLabel.textContent = 'Import complete!';

        setTimeout(() => {
          closeModal();
          toast(
            `✓ Imported ${total} people and ${
              Object.keys(families).length
            } families.`
          );
        }, 800);
      }

        </div>
      </div>
          <div class="modal-actions">

        document.getElementById('modal').style.display = 'flex';
      }

      document.addEventListener('click', (e) => {
        ['add', 'edit'].forEach((mode) => {
          const search = document.getElementById(`${mode}-rel-search`);
          const dropdown = document.getElementById(`${mode}-rel-dropdown`);
          if (!search || !dropdown) return;
          if (!search.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.style.display = 'none';
          }
        });
      });

      window.addEventListener('load', () => {

      window.addEventListener('resize', () => {
        const svg = document.getElementById('ancestor-svg');
        if (svg) {
          const rootId =
            document.querySelector('[data-person-id]')?.dataset.personId;
          if (rootId && allPeople[rootId]) {
            const cardEls = {};
            document.querySelectorAll('[data-person-id]').forEach((el) => {
              cardEls[el.dataset.personId] = el;
            });
          }
        }
      });
    </script>
