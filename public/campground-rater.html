<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampLog — Rate Your Site</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bark: #2C1A0E;
    --pine: #2D4A2D;
    --sage: #7A9E7E;
    --amber: #D4820A;
    --cream: #F5EDD8;
    --smoke: #E8DFC8;
    --ember: #C94A1A;
    --sky: #6B9FAA;
    --gold: #E8B84B;
    --mist: #B8CCC0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(45,74,45,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(212,130,10,0.15) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    border-bottom: 1px solid rgba(245,237,216,0.1);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.02em;
  }
  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--sage);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: 1fr;
    gap: 2.5rem;
    align-items: start;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid rgba(122,158,126,0.3);
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--mist);
    margin-bottom: 0.45rem;
    letter-spacing: 0.03em;
  }

  input[type="text"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    background: rgba(245,237,216,0.06);
    border: 1px solid rgba(245,237,216,0.15);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  input[type="text"]:focus,
  input[type="date"]:focus,
  select:focus,
  textarea:focus {
    border-color: var(--sage);
    background: rgba(245,237,216,0.1);
  }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
  select option { background: #2a1f12; }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

  /* STARS */
  .stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    gap: 4px;
  }
  .stars input { display: none; }
  .stars label {
    font-size: 1.4rem;
    color: rgba(245,237,216,0.2);
    cursor: pointer;
    margin: 0;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }
  .stars label:hover,
  .stars label:hover ~ label { color: var(--gold); transform: scale(1.1); }
  .stars input:checked ~ label { color: var(--gold); }

  /* TOAST */
  .toast {
    display: none;
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--pine);
    border: 1px solid var(--sage);
    color: var(--cream);
    padding: 0.85rem 1.8rem;
    border-radius: 4px;
    font-size: 0.88rem;
    z-index: 9999;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* RATINGS PANEL */
  .ratings-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }
  .ratings-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--sage);
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-chip {
    padding: 0.3rem 0.7rem;
    border: 1px solid rgba(245,237,216,0.15);
    border-radius: 20px;
    background: transparent;
    color: var(--smoke);
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: rgba(122,158,126,0.2);
    border-color: var(--sage);
    color: var(--sage);
  }

  /* REVIEW CARDS */
  .reviews-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .reviews-list::-webkit-scrollbar { width: 4px; }
  .reviews-list::-webkit-scrollbar-thumb { background: rgba(122,158,126,0.4); border-radius: 2px; }

  .review-card {
    background: rgba(245,237,216,0.04);
    border: 1px solid rgba(245,237,216,0.08);
    border-radius: 4px;
    padding: 1.1rem 1.2rem;
    position: relative;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* card action buttons */
  .card-actions {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    display: flex;
    gap: 0.25rem;
  }
  .card-action-btn {
    background: transparent;
    border: none;
    color: rgba(245,237,216,0.2);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.2rem 0.35rem;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .card-action-btn.edit:hover  { color: var(--amber); background: rgba(212,130,10,0.12); }
  .card-action-btn.del:hover   { color: var(--ember); background: rgba(201,74,26,0.12); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; padding-right: 3.5rem; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--cream); font-weight: 700; }
  .card-site { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--amber); letter-spacing: 0.08em; }
  .card-stars { font-size: 0.85rem; color: var(--gold); letter-spacing: 1px; }

  .card-meta { display: flex; gap: 0.75rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
  .meta-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    padding: 0.18rem 0.55rem;
    border-radius: 20px;
    border: 1px solid;
  }
  .pill-type   { border-color: rgba(107,159,170,0.4); color: var(--sky); }
  .pill-date   { border-color: rgba(245,237,216,0.15); color: rgba(245,237,216,0.5); }
  .pill-return-yes { border-color: rgba(122,158,126,0.4); color: var(--sage); }
  .pill-return-no  { border-color: rgba(201,74,26,0.4);  color: #e07050; }

  .card-comment { font-size: 0.83rem; color: var(--smoke); line-height: 1.55; font-style: italic; }
  .card-amenities { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.65rem; }
  .amenity-tag {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    background: rgba(45,74,45,0.4);
    color: var(--mist);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .sub-ratings {
    display: flex;
    gap: 1rem;
    margin-top: 0.65rem;
    padding-top: 0.65rem;
    border-top: 1px solid rgba(245,237,216,0.07);
    flex-wrap: wrap;
  }
  .sub-item { font-size: 0.68rem; font-family: 'DM Mono', monospace; color: rgba(245,237,216,0.4); display: flex; align-items: center; gap: 0.3rem; }
  .sub-stars { color: var(--gold); opacity: 0.7; font-size: 0.6rem; }

  /* Confirm delete overlay */
  .confirm-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(44,26,14,0.92);
    border-radius: 4px;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    z-index: 10;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-overlay span { font-size: 0.82rem; color: var(--smoke); }
  .confirm-yes {
    padding: 0.3rem 0.85rem;
    background: var(--ember);
    border: none; border-radius: 3px;
    color: white; font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s;
  }
  .confirm-yes:hover { background: #e05520; }
  .confirm-no {
    padding: 0.3rem 0.85rem;
    background: transparent;
    border: 1px solid rgba(245,237,216,0.2);
    border-radius: 3px;
    color: var(--smoke); font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: border-color 0.15s;
  }
  .confirm-no:hover { border-color: var(--sage); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: rgba(245,237,216,0.25); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.82rem; line-height: 1.6; }

  /* QUICK RATE BANNER */
  .quick-banner {
    max-width: 1100px;
    margin: 2rem auto 0;
    padding: 0 2rem;
  }
  .quick-panel {
    background: rgba(212,130,10,0.08);
    border: 1px solid rgba(212,130,10,0.35);
    border-radius: 4px;
    padding: 1.25rem 1.5rem;
  }
  .quick-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
  .quick-header .section-label { margin: 0; padding: 0; border: none; }
  .quick-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    background: var(--amber);
    color: var(--bark);
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .quick-context { display: flex; gap: 0.75rem; margin-bottom: 0.85rem; align-items: center; flex-wrap: wrap; }
  .quick-context-field { display: flex; align-items: center; gap: 0.4rem; }
  .quick-context-field label { font-size: 0.68rem; color: rgba(184,204,192,0.7); white-space: nowrap; margin: 0; }
  .quick-context-field input { padding: 0.35rem 0.6rem; font-size: 0.78rem; width: 160px; }

  .quick-row {
    display: grid;
    grid-template-columns: 140px 1fr 1fr 1fr 1fr auto;
    gap: 1rem;
    align-items: end;
  }
  .quick-field label { font-size: 0.7rem; margin-bottom: 0.4rem; color: rgba(184,204,192,0.8); }
  .quick-field input[type="text"] { padding: 0.55rem 0.75rem; font-size: 0.88rem; }

  .quick-stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    gap: 3px;
  }
  .quick-stars input { display: none; }
  .quick-stars label {
    font-size: 1.6rem;
    color: rgba(245,237,216,0.18);
    cursor: pointer; margin: 0; line-height: 1;
    transition: color 0.12s, transform 0.1s;
  }
  .quick-stars label:hover,
  .quick-stars label:hover ~ label,
  .quick-stars input:checked ~ label { color: var(--gold); transform: scale(1.12); }

  .quick-submit {
    padding: 0.55rem 1.2rem;
    background: var(--amber);
    border: none; border-radius: 3px;
    color: var(--bark);
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: background 0.2s;
    height: fit-content;
  }
  .quick-submit:hover { background: var(--gold); }
  .quick-submit:disabled { opacity: 0.5; cursor: default; }

  .quick-note-row { margin-top: 0.75rem; }
  .quick-note-row textarea {
    width: 100%;
    min-height: 48px; max-height: 80px;
    padding: 0.5rem 0.75rem;
    font-size: 0.82rem;
    resize: none; line-height: 1.45;
    background: rgba(245,237,216,0.06);
    border: 1px solid rgba(245,237,216,0.15);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .quick-note-row textarea:focus { border-color: var(--sage); }
  .quick-note-row textarea::placeholder { color: rgba(245,237,216,0.3); }

  /* ── EDIT MODAL ─────────────────────────────────────────── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,10,4,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: #3a2210;
    border: 1px solid rgba(212,130,10,0.35);
    border-radius: 6px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.75rem 2rem;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: transparent;
    border: none;
    color: rgba(245,237,216,0.35);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--cream); }

  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .modal-field { margin-bottom: 1rem; }
  .modal-field label { font-size: 0.74rem; color: var(--mist); margin-bottom: 0.4rem; }

  .modal-ratings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.85rem;
    margin-bottom: 1rem;
  }
  .modal-rating-item label { font-size: 0.72rem; color: var(--mist); margin-bottom: 0.35rem; }

  .modal-save {
    width: 100%;
    padding: 0.8rem;
    background: var(--amber);
    border: none; border-radius: 3px;
    color: var(--bark);
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }
  .modal-save:hover { background: var(--gold); }
  .modal-save:disabled { opacity: 0.5; cursor: default; }

  @media (max-width: 900px) {
    .quick-row { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .quick-submit { grid-column: span 2; width: 100%; }
  }
  @media (max-width: 600px) {
    .modal-row, .modal-ratings { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CampLog</div>
  <span class="logo-tag">// Site Journal</span>
</header>

<!-- QUICK RATE BANNER -->
<div class="quick-banner">
  <div class="quick-panel">
    <div class="quick-header">
      <div class="section-label">// Quick Rate</div>
      <span class="quick-badge">FAST ENTRY</span>
    </div>
    <div class="quick-context">
      <div class="quick-context-field">
        <label>Campground</label>
        <input type="text" id="q-campground" placeholder="Campground name">
      </div>
      <div class="quick-context-field">
        <label>Date</label>
        <input type="date" id="q-date">
      </div>
    </div>
    <div class="quick-row">
      <div class="quick-field">
        <label>Site #</label>
        <input type="text" id="q-site" placeholder="e.g. B-7">
      </div>
      <div class="quick-field">
        <label>Overall</label>
        <div class="quick-stars">
          <input type="radio" name="q-overall" id="qo5" value="5"><label for="qo5">★</label>
          <input type="radio" name="q-overall" id="qo4" value="4"><label for="qo4">★</label>
          <input type="radio" name="q-overall" id="qo3" value="3"><label for="qo3">★</label>
          <input type="radio" name="q-overall" id="qo2" value="2"><label for="qo2">★</label>
          <input type="radio" name="q-overall" id="qo1" value="1"><label for="qo1">★</label>
        </div>
      </div>
      <div class="quick-field">
        <label>Shade</label>
        <div class="quick-stars">
          <input type="radio" name="q-shade" id="qs5" value="5"><label for="qs5">★</label>
          <input type="radio" name="q-shade" id="qs4" value="4"><label for="qs4">★</label>
          <input type="radio" name="q-shade" id="qs3" value="3"><label for="qs3">★</label>
          <input type="radio" name="q-shade" id="qs2" value="2"><label for="qs2">★</label>
          <input type="radio" name="q-shade" id="qs1" value="1"><label for="qs1">★</label>
        </div>
      </div>
      <div class="quick-field">
        <label>Level</label>
        <div class="quick-stars">
          <input type="radio" name="q-level" id="ql5" value="5"><label for="ql5">★</label>
          <input type="radio" name="q-level" id="ql4" value="4"><label for="ql4">★</label>
          <input type="radio" name="q-level" id="ql3" value="3"><label for="ql3">★</label>
          <input type="radio" name="q-level" id="ql2" value="2"><label for="ql2">★</label>
          <input type="radio" name="q-level" id="ql1" value="1"><label for="ql1">★</label>
        </div>
      </div>
      <div class="quick-field">
        <label>Privacy</label>
        <div class="quick-stars">
          <input type="radio" name="q-privacy" id="qp5" value="5"><label for="qp5">★</label>
          <input type="radio" name="q-privacy" id="qp4" value="4"><label for="qp4">★</label>
          <input type="radio" name="q-privacy" id="qp3" value="3"><label for="qp3">★</label>
          <input type="radio" name="q-privacy" id="qp2" value="2"><label for="qp2">★</label>
          <input type="radio" name="q-privacy" id="qp1" value="1"><label for="qp1">★</label>
        </div>
      </div>
      <button class="quick-submit" id="quick-btn" onclick="quickSubmit()">Save →</button>
    </div>
    <div class="quick-note-row">
      <textarea id="q-notes" placeholder="Quick note — clearance, signal, anything worth remembering…" rows="2"></textarea>
    </div>
  </div>
</div>

<main>
  <div class="ratings-panel">
    <h2>Site Journal</h2>
    <div class="ratings-count" id="countLabel">0 sites logged</div>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
      <button class="filter-chip" onclick="setFilter('5', this)">★ 5</button>
      <button class="filter-chip" onclick="setFilter('4', this)">★ 4</button>
      <button class="filter-chip" onclick="setFilter('3', this)">★ 3</button>
      <button class="filter-chip" onclick="setFilter('return', this)">Would Return</button>
    </div>
    <div class="reviews-list" id="reviewsList">
      <div class="empty-state">
        <div class="icon">🏕</div>
        <p>Your site log is empty.<br>Rate your first campground to get started.</p>
      </div>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal" onclick="closeEditIfBackdrop(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <div class="modal-title">Edit Entry</div>

    <div class="modal-row">
      <div class="modal-field">
        <label>Campground</label>
        <input type="text" id="e-campground">
      </div>
      <div class="modal-field">
        <label>Site #</label>
        <input type="text" id="e-site">
      </div>
    </div>

    <div class="modal-row">
      <div class="modal-field">
        <label>Site Type</label>
        <select id="e-siteType">
          <option value="">— None —</option>
          <option>Full Hookup (W/E/S)</option>
          <option>Electric &amp; Water</option>
          <option>Electric Only</option>
          <option>Primitive / Dry</option>
          <option>Pull-Through</option>
          <option>Back-In</option>
          <option>Tent Only</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Date Visited</label>
        <input type="date" id="e-date">
      </div>
    </div>

    <div class="modal-ratings">
      <div class="modal-rating-item">
        <label>Overall</label>
        <div class="stars">
          <input type="radio" name="e-overall" id="eo5" value="5"><label for="eo5">★</label>
          <input type="radio" name="e-overall" id="eo4" value="4"><label for="eo4">★</label>
          <input type="radio" name="e-overall" id="eo3" value="3"><label for="eo3">★</label>
          <input type="radio" name="e-overall" id="eo2" value="2"><label for="eo2">★</label>
          <input type="radio" name="e-overall" id="eo1" value="1"><label for="eo1">★</label>
        </div>
      </div>
      <div class="modal-rating-item">
        <label>Shade</label>
        <div class="stars">
          <input type="radio" name="e-shade" id="esh5" value="5"><label for="esh5">★</label>
          <input type="radio" name="e-shade" id="esh4" value="4"><label for="esh4">★</label>
          <input type="radio" name="e-shade" id="esh3" value="3"><label for="esh3">★</label>
          <input type="radio" name="e-shade" id="esh2" value="2"><label for="esh2">★</label>
          <input type="radio" name="e-shade" id="esh1" value="1"><label for="esh1">★</label>
        </div>
      </div>
      <div class="modal-rating-item">
        <label>Level</label>
        <div class="stars">
          <input type="radio" name="e-level" id="elv5" value="5"><label for="elv5">★</label>
          <input type="radio" name="e-level" id="elv4" value="4"><label for="elv4">★</label>
          <input type="radio" name="e-level" id="elv3" value="3"><label for="elv3">★</label>
          <input type="radio" name="e-level" id="elv2" value="2"><label for="elv2">★</label>
          <input type="radio" name="e-level" id="elv1" value="1"><label for="elv1">★</label>
        </div>
      </div>
      <div class="modal-rating-item">
        <label>Privacy</label>
        <div class="stars">
          <input type="radio" name="e-privacy" id="epr5" value="5"><label for="epr5">★</label>
          <input type="radio" name="e-privacy" id="epr4" value="4"><label for="epr4">★</label>
          <input type="radio" name="e-privacy" id="epr3" value="3"><label for="epr3">★</label>
          <input type="radio" name="e-privacy" id="epr2" value="2"><label for="epr2">★</label>
          <input type="radio" name="e-privacy" id="epr1" value="1"><label for="epr1">★</label>
        </div>
      </div>
    </div>

    <div class="modal-field">
      <label>Notes</label>
      <textarea id="e-notes" rows="3" placeholder="Anything worth remembering…"></textarea>
    </div>

    <button class="modal-save" id="modal-save-btn" onclick="saveEdit()">Save Changes →</button>
  </div>
</div>

<div class="toast" id="toast">✓ Site logged successfully</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, remove, update, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyDO_RXTRJx_PYGERVMcBJTL2aoAgpTXQeE",
    databaseURL: "https://cmk63project-default-rtdb.firebaseio.com"
  });
  const db = getDatabase(app);
  const reviewsRef = ref(db, 'camplog_reviews');

  let reviews = [];
  let activeFilter = 'all';
  let editingKey = null;

  // ── Live listener ────────────────────────────────────────────────
  onValue(reviewsRef, (snapshot) => {
    reviews = [];
    if (snapshot.exists()) {
      snapshot.forEach(child => reviews.push({ _key: child.key, ...child.val() }));
      reviews.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }
    renderReviews();
  });

  // ── Helpers ──────────────────────────────────────────────────────
  function getQuickStars(name) {
    const c = document.querySelector(`input[name="${name}"]:checked`);
    return c ? parseInt(c.value) : 0;
  }
  function getModalStars(name) {
    const c = document.querySelector(`input[name="${name}"]:checked`);
    return c ? parseInt(c.value) : 0;
  }
  function setModalStars(name, val) {
    document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.checked = false);
    if (val) {
      const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
      if (el) el.checked = true;
    }
  }
  function starStr(n, total = 5) {
    return '★'.repeat(n) + '☆'.repeat(total - n);
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg || '✓ Saved';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  // ── Quick Submit ─────────────────────────────────────────────────
  window.quickSubmit = async function() {
    const campground = document.getElementById('q-campground').value.trim();
    const siteNum    = document.getElementById('q-site').value.trim();
    const overall    = getQuickStars('q-overall');
    if (!campground) { alert('Enter a campground name.'); document.getElementById('q-campground').focus(); return; }
    if (!siteNum)    { alert('Enter a site number.');     document.getElementById('q-site').focus(); return; }
    if (!overall)    { alert('Pick an overall rating.');  return; }

    const review = {
      campground, siteNum,
      siteType:  '',
      visitDate: document.getElementById('q-date').value,
      overall,
      shade:     getQuickStars('q-shade'),
      level:     getQuickStars('q-level'),
      privacy:   getQuickStars('q-privacy'),
      quiet: 0, bath: 0,
      amenities: [],
      wouldReturn: null,
      notes:     document.getElementById('q-notes').value.trim(),
      createdAt: Date.now(),
      quickEntry: true
    };

    const btn = document.getElementById('quick-btn');
    btn.textContent = '…'; btn.disabled = true;
    try {
      await push(reviewsRef, review);
      document.getElementById('q-site').value = '';
      document.getElementById('q-notes').value = '';
      document.querySelectorAll('input[name^="q-"]').forEach(r => r.checked = false);
      showToast('⚡ Quick entry saved');
    } catch (err) {
      alert('Firebase error: ' + err.message);
    } finally {
      btn.textContent = 'Save →'; btn.disabled = false;
      document.getElementById('q-site').focus();
    }
  };

  // ── Edit ─────────────────────────────────────────────────────────
  window.openEdit = function(key) {
    const r = reviews.find(x => x._key === key);
    if (!r) return;
    editingKey = key;

    document.getElementById('e-campground').value = r.campground || '';
    document.getElementById('e-site').value       = r.siteNum    || '';
    document.getElementById('e-siteType').value   = r.siteType   || '';
    document.getElementById('e-date').value       = r.visitDate  || '';
    document.getElementById('e-notes').value      = r.notes      || '';

    setModalStars('e-overall',  r.overall  || 0);
    setModalStars('e-shade',    r.shade    || 0);
    setModalStars('e-level',    r.level    || 0);
    setModalStars('e-privacy',  r.privacy  || 0);

    document.getElementById('editModal').classList.add('open');
  };

  window.closeEdit = function() {
    document.getElementById('editModal').classList.remove('open');
    editingKey = null;
  };

  window.closeEditIfBackdrop = function(e) {
    if (e.target === document.getElementById('editModal')) closeEdit();
  };

  window.saveEdit = async function() {
    if (!editingKey) return;
    const campground = document.getElementById('e-campground').value.trim();
    const siteNum    = document.getElementById('e-site').value.trim();
    const overall    = getModalStars('e-overall');
    if (!campground || !siteNum) { alert('Campground and site # are required.'); return; }
    if (!overall) { alert('Please set an overall rating.'); return; }

    const updates = {
      campground,
      siteNum,
      siteType:  document.getElementById('e-siteType').value,
      visitDate: document.getElementById('e-date').value,
      overall,
      shade:     getModalStars('e-shade'),
      level:     getModalStars('e-level'),
      privacy:   getModalStars('e-privacy'),
      notes:     document.getElementById('e-notes').value.trim(),
    };

    const btn = document.getElementById('modal-save-btn');
    btn.textContent = 'Saving…'; btn.disabled = true;
    try {
      await update(ref(db, 'camplog_reviews/' + editingKey), updates);
      closeEdit();
      showToast('✏️ Entry updated');
    } catch (err) {
      alert('Save failed: ' + err.message);
    } finally {
      btn.textContent = 'Save Changes →'; btn.disabled = false;
    }
  };

  // ── Delete ───────────────────────────────────────────────────────
  window.confirmDelete = function(key) {
    document.getElementById('confirm-' + key).classList.add('show');
  };
  window.cancelDelete = function(key) {
    document.getElementById('confirm-' + key).classList.remove('show');
  };
  window.deleteReview = async function(key) {
    try {
      await remove(ref(db, 'camplog_reviews/' + key));
      showToast('🗑 Entry deleted');
    } catch (err) {
      alert('Delete failed: ' + err.message);
    }
  };

  // ── Filter ───────────────────────────────────────────────────────
  window.setFilter = function(val, el) {
    activeFilter = val;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderReviews();
  };

  // ── Render ───────────────────────────────────────────────────────
  function renderReviews() {
    const list  = document.getElementById('reviewsList');
    const label = document.getElementById('countLabel');

    let filtered = reviews;
    if      (activeFilter === '5')      filtered = reviews.filter(r => r.overall === 5);
    else if (activeFilter === '4')      filtered = reviews.filter(r => r.overall === 4);
    else if (activeFilter === '3')      filtered = reviews.filter(r => r.overall === 3);
    else if (activeFilter === 'return') filtered = reviews.filter(r => r.wouldReturn === true);

    label.textContent = `${reviews.length} site${reviews.length !== 1 ? 's' : ''} logged`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${reviews.length ? '🔍' : '🏕'}</div><p>${reviews.length ? 'No sites match this filter.' : 'Your site log is empty.<br>Rate your first campground to get started.'}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(r => {
      const subRatings = [
        r.shade   ? `<span class="sub-item">Shade <span class="sub-stars">${starStr(r.shade)}</span></span>`     : '',
        r.privacy ? `<span class="sub-item">Privacy <span class="sub-stars">${starStr(r.privacy)}</span></span>` : '',
        r.level   ? `<span class="sub-item">Level <span class="sub-stars">${starStr(r.level)}</span></span>`     : '',
        r.quiet   ? `<span class="sub-item">Quiet <span class="sub-stars">${starStr(r.quiet)}</span></span>`     : '',
        r.bath    ? `<span class="sub-item">Baths <span class="sub-stars">${starStr(r.bath)}</span></span>`      : '',
      ].filter(Boolean).join('');
      const am = Array.isArray(r.amenities) ? r.amenities : [];

      return `
      <div class="review-card" id="card-${r._key}">
        <div class="card-actions">
          <button class="card-action-btn edit" onclick="openEdit('${r._key}')" title="Edit">✎</button>
          <button class="card-action-btn del"  onclick="confirmDelete('${r._key}')" title="Delete">✕</button>
        </div>
        <div class="confirm-overlay" id="confirm-${r._key}">
          <span>Delete this entry?</span>
          <button class="confirm-yes" onclick="deleteReview('${r._key}')">Delete</button>
          <button class="confirm-no"  onclick="cancelDelete('${r._key}')">Cancel</button>
        </div>
        <div class="card-header">
          <div>
            <div class="card-name">${r.campground}</div>
            <div class="card-site">Site ${r.siteNum}</div>
          </div>
          <div class="card-stars">${starStr(r.overall)}</div>
        </div>
        <div class="card-meta">
          ${r.siteType  ? `<span class="meta-pill pill-type">${r.siteType}</span>` : ''}
          ${r.visitDate ? `<span class="meta-pill pill-date">${r.visitDate}</span>` : ''}
          ${r.wouldReturn === true  ? '<span class="meta-pill pill-return-yes">↩ Would Return</span>' : ''}
          ${r.wouldReturn === false ? '<span class="meta-pill pill-return-no">✗ Wouldn\'t Return</span>' : ''}
        </div>
        ${r.notes ? `<div class="card-comment">"${r.notes}"</div>` : ''}
        ${am.length ? `<div class="card-amenities">${am.map(a => `<span class="amenity-tag">${a}</span>`).join('')}</div>` : ''}
        ${subRatings ? `<div class="sub-ratings">${subRatings}</div>` : ''}
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
